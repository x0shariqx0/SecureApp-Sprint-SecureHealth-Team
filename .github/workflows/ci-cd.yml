name: CI/CD Pipeline

on:
  push:
  pull_request:

permissions:
  contents: read
  actions: read
  security-events: write

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Build application
        run: |
          python -m py_compile app.py config.py database.py models.py
          echo "Build completed successfully"

      - name: Run tests
        run: |
          pytest -v

  sast-codeql:
    name: SAST with CodeQL
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: python
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

  fail-on-critical:
    name: Fail if critical vulnerabilities exist
    runs-on: ubuntu-latest
    needs: sast-codeql

    steps:
      - name: Check open code scanning alerts
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const response = await github.request(
              "GET /repos/{owner}/{repo}/code-scanning/alerts",
              {
                owner,
                repo,
                state: "open",
                per_page: 100
              }
            );

            const criticalAlerts = response.data.filter(alert =>
              alert.rule &&
              alert.rule.security_severity_level &&
              alert.rule.security_severity_level.toLowerCase() === "critical"
            );

            core.info(`Total open alerts found: ${response.data.length}`);
            core.info(`Critical open alerts found: ${criticalAlerts.length}`);

            if (criticalAlerts.length > 0) {
              core.setFailed(
                `Pipeline failed because ${criticalAlerts.length} critical vulnerability/vulnerabilities were detected.`
              );
            } else {
              core.info("No critical vulnerabilities found.");
            }
